[build]
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/uma/import-calendar"
  to = "/.netlify/functions/import-calendar"
  status = 200

# Proxy API calls to the Render backend
[[redirects]]
  from = "/api/*"
  to = "https://planit-app-8ds5.onrender.com/api/:splat"
  status = 200
  force = true

# SPA Routing: Redirect all other requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
