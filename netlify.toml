[build]
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/dist"

# Proxy API calls to the Render backend
[[redirects]]
  from = "/api/*"
  to = "https://planit-app-8ds5.onrender.com/api/:splat"
  status = 200
  force = true

# SPA Routing: Redirect all other requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
